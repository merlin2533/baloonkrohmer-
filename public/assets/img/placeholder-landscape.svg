<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Bild folgt">
  <defs>
    <linearGradient id="sky-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="60%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#FED7AA"/>
    </linearGradient>
  </defs>
  <!-- Himmel -->
  <rect width="800" height="450" fill="url(#sky-l)"/>
  <!-- Wiesen-Silhouette -->
  <ellipse cx="150" cy="420" rx="220" ry="40" fill="#86EFAC" opacity="0.5"/>
  <ellipse cx="650" cy="430" rx="200" ry="35" fill="#86EFAC" opacity="0.4"/>
  <rect x="0" y="390" width="800" height="60" fill="#4ADE80" opacity="0.3"/>
  <!-- Ballon-Hülle -->
  <ellipse cx="400" cy="180" rx="68" ry="80" fill="#F97316"/>
  <ellipse cx="400" cy="180" rx="68" ry="80" fill="none" stroke="#EA580C" stroke-width="1.5"/>
  <!-- Ballon-Streifen -->
  <line x1="332" y1="180" x2="468" y2="180" stroke="#EA580C" stroke-width="1" opacity="0.4"/>
  <ellipse cx="400" cy="180" rx="35" ry="80" fill="none" stroke="#EA580C" stroke-width="1" opacity="0.3"/>
  <ellipse cx="400" cy="180" rx="68" ry="40" fill="none" stroke="#EA580C" stroke-width="1" opacity="0.25"/>
  <!-- Leinen -->
  <line x1="366" y1="255" x2="376" y2="285" stroke="#92400E" stroke-width="1.5"/>
  <line x1="434" y1="255" x2="424" y2="285" stroke="#92400E" stroke-width="1.5"/>
  <!-- Korb -->
  <rect x="374" y="285" width="52" height="28" rx="4" fill="#92400E"/>
  <rect x="374" y="285" width="52" height="28" rx="4" fill="none" stroke="#78350F" stroke-width="1.5"/>
  <!-- Gitter Korb -->
  <line x1="387" y1="285" x2="387" y2="313" stroke="#78350F" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="285" x2="400" y2="313" stroke="#78350F" stroke-width="1" opacity="0.5"/>
  <line x1="413" y1="285" x2="413" y2="313" stroke="#78350F" stroke-width="1" opacity="0.5"/>
  <!-- Beschriftung -->
  <rect x="210" y="352" width="380" height="44" rx="6" fill="white" opacity="0.75"/>
  <text x="400" y="370" font-family="system-ui, sans-serif" font-size="13" fill="#0B1726" text-anchor="middle" opacity="0.7">Ballonsport Krohmer</text>
  <text x="400" y="388" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0B1726" text-anchor="middle">Bild folgt</text>
</svg>
